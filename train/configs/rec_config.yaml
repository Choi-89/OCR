model:
  name: "SVTR_Tiny"
  backbone:
    type: "SVTRNet"
    img_size: [32, 320]
    in_channels: 3
    embed_dim: [64, 128, 256]
    depth: [3, 6, 3]
    num_heads: [2, 4, 8]
    mixer: ["Local", "Local", "Local",
            "Global", "Global", "Global",
            "Global", "Global", "Global",
            "Local", "Local", "Local"]
    local_mixer: [[7, 11], [7, 11], [7, 11]]
    pretrained: true
    pretrained_path: "train/weights/svtr_tiny_pretrained.pdparams"
    patch_embedding_freeze_epochs: 5
    patch_embedding_lr_scale: 0.1
  head:
    type: "CTCHead"
    vocab_size: 11315
    mid_channels: 96

decoder:
  type: "CTCDecoder"
  method: "greedy"
  beam_width: 5
  blank_index: 11314

input:
  height: 32
  max_width: 320
  min_width: 32
  padding_value: 0
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

dict_path: "backend/ocr/dict/dict_latest.txt"

runtime:
  device: "gpu"
  gpu_ids: [0]
  precision: "fp16"
  distributed: false

dataloader:
  batch_size: 64
  shuffle: true
  num_workers: 8
  prefetch_factor: 2
  persistent_workers: true
  pin_memory: true

training:
  epochs: 80
  log_interval: 50
  eval_interval: 1
  save_top_k: 3
