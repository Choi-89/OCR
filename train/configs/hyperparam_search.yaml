seed: 42
experiment_name_rule: "{model}_{index:03d}_{field}_{value}"
reproducibility_tolerance: 0.005

cls:
  fixed:
    input_size: [48, 192]
    model: "MobileNetV3Small"
    optimizer: "Adam"
    loss: "FocalLoss(gamma=2, alpha=0.25)"
    scheduler: "StepDecay(step=10, gamma=0.1)"
    weight_decay: 0.0001
    num_workers: 8
  first_run:
    base_lr: 0.001
    batch_size: 128
    epochs: 50
    inference_threshold: 0.7
  search:
    base_lr: [0.0001, 0.0005, 0.001, 0.005]
    batch_size: [64, 128]
    epochs: [30, 50, 100]
    inference_threshold: [0.5, 0.6, 0.7, 0.8]
  order: [base_lr, batch_size, epochs, inference_threshold]

det:
  fixed:
    model: "DBNet++"
    backbone: "ResNet50"
    fpn_out_channels: 256
    db_loss_alpha: 10
    db_loss_beta: 5
    db_k: 50
    ohem_ratio: 3
    optimizer: "Adam"
    weight_decay: 0.0001
    backbone_lr_ratio: 0.1
    freeze_epochs: 5
    scheduler: "WarmupCosineDecay"
    warmup_steps: 500
    input_max_side: 960
  first_run:
    base_lr: 0.001
    min_lr: 0.000001
    batch_size: 12
    epochs: 120
    unclip_ratio: 1.5
    prob_threshold: 0.3
    box_threshold: 0.5
    min_box_size: 3
  search:
    base_lr: [0.0005, 0.001, 0.003]
    batch_size: [8, 12, 16]
    epochs: [100, 200, 300]
    min_lr: [0.000001, 0.00001]
    unclip_ratio: [1.3, 1.5, 1.7, 2.0]
    prob_threshold: [0.2, 0.3, 0.4, 0.5]
    box_threshold: [0.3, 0.5, 0.7]
    min_box_size: [2, 3, 5]
  order: [batch_size, base_lr, epochs, min_lr, unclip_ratio, prob_threshold, box_threshold, min_box_size]

rec:
  fixed:
    model: "SVTR-Tiny"
    input_height: 32
    input_max_width: 320
    input_min_width: 32
    ctc_blank_index: "vocab_size - 1"
    optimizer: "Adam"
    weight_decay: 0.00001
    gradient_clip: 5.0
    freeze_epochs: 5
    scheduler: "WarmupCosineDecay"
    warmup_steps: 300
    decoder: "greedy"
  first_run:
    base_lr: 0.001
    min_lr: 0.000001
    batch_size: 64
    epochs: 80
    label_smoothing: 0.0
    decoder: "greedy"
    beam_width: 5
  search:
    base_lr: [0.0005, 0.001, 0.003]
    batch_size: [64, 128]
    epochs: [50, 100, 150]
    label_smoothing: [0.0, 0.05, 0.1]
    min_lr: [0.000001, 0.00001]
    beam_width: [3, 5, 10]
  order: [batch_size, base_lr, epochs, label_smoothing, min_lr, beam_width]
