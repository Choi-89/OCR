model:
  name: "MobileNetV3Small"
  num_classes: 2
  pretrained: true
  pretrained_path: "train/weights/mobilenetv3_small_imagenet.pdparams"
  dropout: 0.2

input:
  height: 48
  width: 192
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

inference:
  threshold: 0.7
  label_list: ["0", "180"]

runtime:
  device: "gpu"
  gpu_ids: [0]
  precision: "fp16"
  distributed: false

dataloader:
  batch_size: 128
  shuffle: true
  num_workers: 8
  prefetch_factor: 2
  persistent_workers: true
  pin_memory: true

training:
  epochs: 25
  log_interval: 20
  eval_interval: 1
  save_top_k: 3
