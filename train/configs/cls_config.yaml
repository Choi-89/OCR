model:
  name: "MobileNetV3Small"
  num_classes: 2
  pretrained: true
  pretrained_path: "train/weights/mobilenetv3_small_imagenet.pdparams"
  dropout: 0.2

input:
  height: 48
  width: 192
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

inference:
  threshold: 0.7
  label_list: ["0", "180"]

runtime:
  device: "gpu"
  gpu_ids: [0]
  precision: "fp16"
  distributed: false

dataloader:
  batch_size: 128
  shuffle: true
  num_workers: 8
  prefetch_factor: 2
  persistent_workers: true
  pin_memory: true

training:
  epochs: 25
  base_lr: 0.001
  weight_decay: 0.0001
  log_interval: 20
  eval_interval: 1
  save_top_k: 3

loss:
  type: "FocalLoss"
  gamma: 2.0
  alpha: 0.25

optimizer:
  type: "Adam"
  beta1: 0.9
  beta2: 0.999

scheduler:
  type: "StepDecay"
  step_size: 10
  gamma: 0.1

early_stopping:
  enabled: true
  patience: 10
  monitor: "val_accuracy"
  min_delta: 0.001
  restore_best: true
