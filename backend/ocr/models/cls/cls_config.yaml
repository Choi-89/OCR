model:
  name: "MobileNetV3Small"
  num_classes: 2
  pretrained: true
  pretrained_path: "backend/ocr/models/cls/weights/mobilenetv3_small_imagenet.pdparams"
  dropout: 0.2

input:
  height: 48
  width: 192
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

inference:
  threshold: 0.5
  label_list: ["0", "180"]

